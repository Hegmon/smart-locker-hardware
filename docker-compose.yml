services:
  camera-service:
    build: .
    container_name: camera_service
    restart: unless-stopped

    privileged: true

    devices:
      - /dev/video0:/dev/video0
      - /dev/gpiochip0:/dev/gpiochip0

    volumes:
      - ./hardware:/app/hardware
      - ./data:/app/data

    environment:
      DEVICE_ID: locker-001
      API_URL: https://backend.qbox.sa/

    working_dir: /app/hardware
    command: python3 camera_stream_service.py

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  default:
    name: smart_locker_network