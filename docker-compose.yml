services:
  camera-service:
    build: .
    container_name: camera_service
    restart: unless-stopped
    privileged: true           # Grant full device access
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5

    devices:
      - /dev/video0:/dev/video0   # External
      - /dev/video3:/dev/video3   # Internal mapped correctly
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip4:/dev/gpiochip4
      - /dev/i2c-20:/dev/i2c-1

    group_add:
      - video

    volumes:
      - ./hardware:/app/hardware:ro
      - ./data:/app/data

    working_dir: /app/hardware
    command: python3 -u camera_stream_service.py start

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

networks:
  default:
    name: smart_locker_network