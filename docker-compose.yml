services:
  camera-service:
    build: .
    container_name: camera_service
    restart: unless-stopped
    mem_limit: 512m        # Limit container memory
    mem_reservation: 256m  # Reserve minimum memory
    cpus: 0.5             # Limit CPU to 50%

    devices:
      - /dev/video0:/dev/video0
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip4:/dev/gpiochip4
      - /dev/i2c-1:/dev/i2c-1
      - /dev/spidev0.0:/dev/spidev0.0

    volumes:
      - ./hardware:/app/hardware:ro
      - ./data:/app/data

    environment:
      - DEVICE_ID=locker-001
      - API_URL=https://backend.qbox.sa/
      - LIBCAMERA_LOG_LEVELS=*:ERROR
      - OPENCV_IO_THREADS=1
      - OMP_NUM_THREADS=1

    working_dir: /app/hardware
    command: python3 -u camera_stream_service.py

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

networks:
  default:
    name: smart_locker_network
